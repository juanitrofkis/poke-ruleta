<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké-Ruleta Multi-QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        .chart-container { position: relative; width: 100%; max-width: 380px; margin: 0 auto; height: 380px; }
        .pointer { 
            width: 0; height: 0; 
            border-left: 18px solid transparent; 
            border-right: 18px solid transparent; 
            border-top: 35px solid #1c1917; 
            position: absolute; top: -10px; left: 50%; 
            transform: translateX(-50%); z-index: 50;
        }
        .wheel-wrapper { transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); width: 100%; height: 100%; }
        @media print {
            .no-print { display: none !important; }
            .print-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #e5e7eb; margin-bottom: 2rem; padding: 1rem; border-radius: 1rem; display: flex; flex-direction: column; align-items: center; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <!-- Chosen Palette: Slate and White for a clean "Management" interface, keeping the Red/Blue/Green for the actual wheels. -->
    <!-- Application Structure Plan: A dual-mode SPA. Mode 1 (Creator): Dashboard to manage a list of up to 10 roulettes, generate individual QRs, and a print view. Mode 2 (Player): Triggered by URL params, shows ONLY the specific wheel. This allows the user to prepare 10 different games from a single URL. -->
    <!-- Visualization: Chart.js for wheels, QRious for QR generation. State is derived from URL. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <!-- MODO JUGADOR (Se activa por URL) -->
        <div id="playerView" class="hidden flex flex-col items-center justify-center min-h-[80vh]">
            <h1 id="playerTitle" class="text-3xl font-black mb-10 tracking-tighter">POKÉ-RULETA JUEGO</h1>
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl border-4 border-white w-full max-w-xl flex flex-col items-center">
                <div class="chart-container">
                    <div class="pointer"></div>
                    <div id="wheelContainer" class="wheel-wrapper">
                        <canvas id="rouletteCanvas"></canvas>
                    </div>
                </div>
                <div class="mt-8 text-center">
                    <div class="h-16 flex items-center justify-center mb-4">
                        <p id="resultText" class="text-2xl font-black opacity-0 transition-opacity"></p>
                    </div>
                    <button id="btnSpin" class="bg-red-500 hover:bg-red-600 text-white text-2xl font-black px-12 py-5 rounded-2xl shadow-[0_8px_0_rgb(185,28,28)] active:shadow-none active:translate-y-2 transition-all">
                        ¡GIRAR!
                    </button>
                </div>
            </div>
        </div>

        <!-- MODO CREADOR (Configuración múltiple) -->
        <div id="creatorView" class="no-print">
            <header class="mb-10 text-center">
                <h1 class="text-4xl font-black text-slate-800">Panel de Gestión de Ruletas</h1>
                <p class="text-slate-500 mt-2">Crea hasta 10 ruletas diferentes y genera sus códigos QR para imprimir.</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Formulario -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 class="text-lg font-bold mb-4 italic">Nueva Ruleta</h2>
                        <div class="space-y-3">
                            <input type="text" id="p1" placeholder="Pokémon 1" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-slate-400">
                            <input type="text" id="p2" placeholder="Pokémon 2" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-slate-400">
                            <input type="text" id="p3" placeholder="Pokémon 3" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-slate-400">
                            <button id="btnAdd" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all">
                                Añadir a la lista
                            </button>
                        </div>
                    </div>
                    <button onclick="window.print()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                        Imprimir todas las tarjetas QR
                    </button>
                </div>

                <!-- Lista de Ruletas -->
                <div class="lg:col-span-8">
                    <div id="rouletteList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Las tarjetas se generan aquí -->
                    </div>
                </div>
            </div>
        </div>

        <!-- ZONA DE IMPRESIÓN (Visible solo al imprimir) -->
        <div id="printZone" class="hidden print:block">
            <h1 class="text-2xl font-bold mb-8 text-center border-b pb-4">Colección de Códigos QR - Poké-Ruleta</h1>
            <div id="printGrid" class="grid grid-cols-2 gap-8"></div>
        </div>

    </div>

    <script>
        Chart.register(ChartDataLabels);
        
        let roulettes = [];
        let myChart = null;
        let currentRotation = 0;
        let isSpinning = false;

        function init() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('p1')) {
                document.getElementById('creatorView').style.display = 'none';
                document.getElementById('playerView').style.display = 'flex';
                initPlayer(params.get('p1'), params.get('p2'), params.get('p3'));
            } else {
                renderList();
            }
        }

        // --- LÓGICA DEL CREADOR ---

        document.getElementById('btnAdd').addEventListener('click', () => {
            const p1 = document.getElementById('p1').value || "P1";
            const p2 = document.getElementById('p2').value || "P2";
            const p3 = document.getElementById('p3').value || "P3";
            
            if(roulettes.length >= 10) {
                alert("Máximo 10 ruletas");
                return;
            }

            const url = new URL(window.location.href.split('?')[0]);
            url.searchParams.set('p1', p1);
            url.searchParams.set('p2', p2);
            url.searchParams.set('p3', p3);

            roulettes.push({ p1, p2, p3, url: url.toString() });
            renderList();
            
            // Limpiar inputs
            document.getElementById('p1').value = "";
            document.getElementById('p2').value = "";
            document.getElementById('p3').value = "";
        });

        function renderList() {
            const list = document.getElementById('rouletteList');
            const printGrid = document.getElementById('printGrid');
            list.innerHTML = "";
            printGrid.innerHTML = "";

            roulettes.forEach((r, index) => {
                // Tarjeta en pantalla
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center";
                card.innerHTML = `
                    <p class="font-bold text-sm mb-2">Ruleta #${index + 1}</p>
                    <p class="text-xs text-slate-400 mb-4">${r.p1}, ${r.p2}, ${r.p3}</p>
                    <canvas id="qr-${index}"></canvas>
                    <button onclick="removeRoulette(${index})" class="mt-4 text-red-500 text-xs font-bold uppercase tracking-tighter">Eliminar</button>
                `;
                list.appendChild(card);

                // Tarjeta de impresión
                const pCard = document.createElement('div');
                pCard.className = "print-card";
                pCard.innerHTML = `
                    <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem;">Ruleta #${index + 1}</h2>
                    <p style="margin-bottom: 1rem;">Opciones: ${r.p1} | ${r.p2} | ${r.p3}</p>
                    <canvas id="qr-print-${index}"></canvas>
                    <p style="font-size: 0.7rem; margin-top: 1rem; color: #666;">Escanea para jugar</p>
                `;
                printGrid.appendChild(pCard);

                // Generar QRs
                setTimeout(() => {
                    new QRious({ element: document.getElementById(`qr-${index}`), value: r.url, size: 120 });
                    new QRious({ element: document.getElementById(`qr-print-${index}`), value: r.url, size: 200 });
                }, 10);
            });
        }

        function removeRoulette(idx) {
            roulettes.splice(idx, 1);
            renderList();
        }

        // --- LÓGICA DEL JUGADOR ---

        function initPlayer(n1, n2, n3) {
            const ctx = document.getElementById('rouletteCanvas').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: [n1, n2, n3],
                    datasets: [{
                        data: [1, 1, 1],
                        backgroundColor: ['#ef4444', '#3b82f6', '#22c55e'],
                        borderColor: '#ffffff',
                        borderWidth: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            color: '#fff',
                            font: { size: 22, weight: 'bold' },
                            formatter: (v, ctx) => ctx.chart.data.labels[ctx.dataIndex]
                        }
                    }
                }
            });

            document.getElementById('btnSpin').addEventListener('click', spin);
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('resultText').style.opacity = "0";

            const extra = 3600 + Math.floor(Math.random() * 360);
            currentRotation += extra;
            document.getElementById('wheelContainer').style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const normalized = (360 - (currentRotation % 360)) % 360;
                let winIdx = 0;
                if (normalized < 120) winIdx = 0;
                else if (normalized < 240) winIdx = 1;
                else winIdx = 2;

                const res = document.getElementById('resultText');
                res.textContent = `¡HAS SACADO A ${myChart.data.labels[winIdx].toUpperCase()}!`;
                res.style.opacity = "1";
            }, 4000);
        }

        init();
    </script>
</body>
</html>
