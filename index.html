<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké-Ruleta Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Plugin para dibujar etiquetas dentro de los sectores -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        .chart-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; height: 400px; }
        .pointer { 
            width: 0; height: 0; 
            border-left: 20px solid transparent; 
            border-right: 20px solid transparent; 
            border-top: 40px solid #1c1917; 
            position: absolute; top: -10px; left: 50%; 
            transform: translateX(-50%); z-index: 50;
            filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.4));
        }
        .wheel-wrapper { transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); width: 100%; height: 100%; }
        #rouletteCanvas { cursor: pointer; }
        .hidden-mode { display: none !important; }
    </style>
</head>
<body class="bg-stone-100 text-stone-900 font-sans min-h-screen flex flex-col items-center p-4">

    <!-- Chosen Palette: Stone neutrals with vibrant Pokemon-inspired accents (Red, Blue, Green) -->
    <!-- Application Structure Plan: The app uses a URL-based state detection. If 'p1' exists in the URL, it assumes "Play Mode" and hides the configuration panel. If not, it shows "Edit Mode". This ensures the friend in Madrid only sees the game, while the user can still edit if they go to the base URL. -->
    <!-- Visualization & Content Choices: Chart.js with the Datalabels plugin is used to ensure names are visible ON the wheel. The rotation logic accounts for the 4s CSS transition. QR code is generated using QRious. NO SVG used. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <div class="max-w-4xl w-full flex flex-col items-center">
        
        <!-- SECCIÓN DE CABECERA -->
        <header class="text-center my-8">
            <h1 class="text-4xl font-black tracking-tighter text-stone-900">POKÉ-RULETA</h1>
            <p id="modeDescription" class="text-stone-500 mt-2 italic">Cargando modo...</p>
        </header>

        <div class="w-full grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- PANEL DE CONFIGURACIÓN (Oculto si se accede por QR) -->
            <aside id="configPanel" class="lg:col-span-5 bg-white p-6 rounded-3xl shadow-xl border border-stone-200">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    Configurar Ruleta
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-stone-400 mb-1">Opción 1</label>
                        <input type="text" id="p1Input" placeholder="Pikachu" class="w-full bg-stone-50 border-2 border-stone-100 p-3 rounded-xl focus:border-stone-800 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-stone-400 mb-1">Opción 2</label>
                        <input type="text" id="p2Input" placeholder="Charmander" class="w-full bg-stone-50 border-2 border-stone-100 p-3 rounded-xl focus:border-stone-800 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-stone-400 mb-1">Opción 3</label>
                        <input type="text" id="p3Input" placeholder="Squirtle" class="w-full bg-stone-50 border-2 border-stone-100 p-3 rounded-xl focus:border-stone-800 outline-none transition-all">
                    </div>
                    
                    <button id="btnSave" class="w-full bg-stone-900 text-white font-bold py-4 rounded-xl hover:bg-black transition-all shadow-lg active:scale-95">
                        GENERAR CÓDIGO QR
                    </button>
                </div>

                <div id="qrSection" class="mt-8 pt-8 border-t border-stone-100 flex flex-col items-center hidden">
                    <p class="text-sm font-medium text-stone-400 mb-4 uppercase tracking-widest">Escanea para jugar</p>
                    <div class="bg-white p-4 rounded-2xl shadow-inner border border-stone-100">
                        <canvas id="qrCanvas"></canvas>
                    </div>
                    <p class="text-[10px] text-stone-400 mt-4 text-center break-all max-w-[200px]" id="currentLinkText"></p>
                </div>
            </aside>

            <!-- ÁREA DE JUEGO (Siempre visible) -->
            <section id="gameArea" class="lg:col-span-7 flex flex-col items-center bg-white p-8 rounded-[3rem] shadow-2xl border-4 border-white">
                
                <div class="chart-container">
                    <div class="pointer"></div>
                    <div id="wheelContainer" class="wheel-wrapper">
                        <canvas id="rouletteCanvas"></canvas>
                    </div>
                </div>

                <div class="mt-10 text-center">
                    <div id="resultBox" class="mb-6 h-16 flex items-center justify-center">
                        <p id="resultText" class="text-2xl font-black text-stone-900 opacity-0 transition-opacity"></p>
                    </div>
                    
                    <button id="btnSpin" class="bg-red-500 hover:bg-red-600 text-white text-2xl font-black px-12 py-5 rounded-2xl shadow-[0_8px_0_rgb(185,28,28)] active:shadow-none active:translate-y-2 transition-all">
                        ¡SPIN!
                    </button>
                </div>
            </section>
        </div>

        <footer class="mt-12 text-stone-400 text-xs text-center pb-8">
            Si deseas editar la ruleta, borra los parámetros de la URL.
        </footer>
    </div>

    <script>
        // Registrar el plugin de etiquetas
        Chart.register(ChartDataLabels);

        let myChart = null;
        let isSpinning = false;
        let currentRotation = 0;

        const p1Input = document.getElementById('p1Input');
        const p2Input = document.getElementById('p2Input');
        const p3Input = document.getElementById('p3Input');
        const btnSave = document.getElementById('btnSave');
        const btnSpin = document.getElementById('btnSpin');
        const configPanel = document.getElementById('configPanel');
        const modeDescription = document.getElementById('modeDescription');
        const resultText = document.getElementById('resultText');
        const wheelContainer = document.getElementById('wheelContainer');

        function init() {
            const params = new URLSearchParams(window.location.search);
            const p1 = params.get('p1');
            const p2 = params.get('p2');
            const p3 = params.get('p3');

            if (p1 && p2 && p3) {
                // MODO JUGADOR: Bloquear edición
                configPanel.classList.add('hidden-mode');
                document.getElementById('gameArea').parentElement.classList.remove('lg:grid-cols-12');
                document.getElementById('gameArea').parentElement.classList.add('flex', 'justify-center');
                document.getElementById('gameArea').classList.replace('lg:col-span-7', 'max-w-xl');
                modeDescription.textContent = "Modo Visualización - Madrid";
                updateWheel(p1, p2, p3);
            } else {
                // MODO CREADOR
                modeDescription.textContent = "Modo Editor - Crea tu reto";
                updateWheel("Opción 1", "Opción 2", "Opción 3");
            }
        }

        function updateWheel(n1, n2, n3) {
            const ctx = document.getElementById('rouletteCanvas').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: [n1, n2, n3],
                    datasets: [{
                        data: [1, 1, 1],
                        backgroundColor: ['#ef4444', '#3b82f6', '#22c55e'],
                        borderColor: '#ffffff',
                        borderWidth: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    rotation: 0,
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false },
                        datalabels: {
                            color: '#ffffff',
                            font: { weight: 'bold', size: 20 },
                            formatter: (value, context) => context.chart.data.labels[context.dataIndex],
                            anchor: 'center',
                            align: 'center'
                        }
                    }
                }
            });
        }

        function generateQR() {
            const v1 = p1Input.value || "Opción 1";
            const v2 = p2Input.value || "Opción 2";
            const v3 = p3Input.value || "Opción 3";

            const url = new URL(window.location.href.split('?')[0]);
            url.searchParams.set('p1', v1);
            url.searchParams.set('p2', v2);
            url.searchParams.set('p3', v3);

            const finalUrl = url.toString();
            
            // Actualizar QR
            document.getElementById('qrSection').classList.remove('hidden');
            new QRious({
                element: document.getElementById('qrCanvas'),
                value: finalUrl,
                size: 200,
                level: 'H'
            });
            document.getElementById('currentLinkText').textContent = finalUrl;
            
            // Actualizar vista previa de la ruleta
            updateWheel(v1, v2, v3);
            window.history.pushState({}, '', finalUrl);
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            resultText.style.opacity = "0";

            const spins = 5 + Math.floor(Math.random() * 5); // Entre 5 y 10 vueltas completas
            const extraDegrees = Math.floor(Math.random() * 360);
            const totalDegrees = spins * 360 + extraDegrees;
            
            currentRotation += totalDegrees;
            wheelContainer.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                
                // Cálculo del ganador basado en la rotación final
                // El puntero está arriba (0 grados). 
                // Cada sección mide 120 grados.
                const actualRotation = currentRotation % 360;
                const relativeDegree = (360 - actualRotation) % 360;
                
                let winnerIdx = 0;
                if (relativeDegree < 120) winnerIdx = 0;
                else if (relativeDegree < 240) winnerIdx = 1;
                else winnerIdx = 2;

                const winner = myChart.data.labels[winnerIdx];
                resultText.textContent = `¡HA SALIDO: ${winner.toUpperCase()}!`;
                resultText.style.opacity = "1";
                
                // Pequeña animación de éxito
                resultText.classList.add('animate-bounce');
                setTimeout(() => resultText.classList.remove('animate-bounce'), 1000);
            }, 4000);
        }

        btnSave.addEventListener('click', generateQR);
        btnSpin.addEventListener('click', spin);

        init();
    </script>
</body>
</html>
